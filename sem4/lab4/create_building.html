<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY CADASTRE - Создание здания</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MY CADASTRE" class="logo-img">
                <span class="logo-text">MY CADASTRE</span>
            </div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/owners">Владельцы</a>
                <a href="/objects">Объекты</a>
                <a href="/rights">Регистрация прав</a>
                <a href="/extract">Выписка</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="content-page">
            <div class="page-header">
                <h1>Создание здания</h1>
                <a href="/objects" class="btn-service">← Назад к объектам</a>
            </div>

            <div class="form-container" style="margin: 0 auto;">
                <form method="POST" action="/object/create/building">
                    <div class="form-group">
                        <label>Адрес *</label>
                        <input type="text" name="adres" required>
                    </div>
                    <div class="form-group">
                        <label>Площадь (м²) *</label>
                        <input type="number" step="0.01" name="ploshchad" required>
                    </div>
                    <div class="form-group">
                        <label>Количество этажей *</label>
                        <input type="number" name="etazhi" required>
                    </div>
                    <div class="form-group">
                        <label>Материал стен *</label>
                        <input type="text" name="material" required>
                    </div>
                    <div class="form-group">
                        <label>Назначение *</label>
                        <select name="naznachenie" required>
                            <option value="zhiloe">Жилое</option>
                            <option value="nezhiloe">Нежилое</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Год постройки *</label>
                        <input type="number" name="god" min="1800" max="2026" required>
                    </div>
                    <button type="submit" class="btn-submit">Создать здание</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 MY CADASTRE — Кадастровое агентство</p>
        <p>Регистрация прав, кадастровый учет, оценка и адресация</p>
    </footer>
</body>
</html>
